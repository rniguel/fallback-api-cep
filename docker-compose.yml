services:
  backend-dev:
    build:
      context: ./backend
      target: development
    ports:
      - "3333:3333"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["dev"]

  frontend-dev:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend-dev:3333
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend-dev:
        condition: service_healthy
    profiles: ["dev"]

  backend-prod:
    build:
      context: ./backend
      target: production
    ports:
      - "3333:3333"
    env_file:
      - ./backend/.env
    profiles: ["prod"]

  frontend-prod:
    build:
      context: ./frontend
      target: production
      args:
        - VITE_API_URL=http://localhost:3333
    ports:
      - "8080:80"
    depends_on:
      backend-prod:
        condition: service_healthy
    profiles: ["prod"]
